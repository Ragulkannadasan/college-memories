<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>College Memories version 1.5</title>
    <link rel="icon" type="image/webp" href="assets/mpi23.webp">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Round" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="app-container">
        <div class="sidebar-overlay" id="sidebar-overlay"></div>
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <h2 class="brand">
                    <span class="material-icons-round">cloud</span>
                    Memories
                </h2>
                <span class="material-icons-round close-sidebar" id="close-sidebar">close</span>
            </div>
            <nav id="sidebar-nav">
                <a href="#" class="active" data-filter="all"><span class="material-icons-round">folder</span>Home</a>
                <a href="#" data-filter="image"><span class="material-icons-round">photo_library</span> Photos</a>
                <a href="#" data-filter="video"><span class="material-icons-round">play_circle_filled</span> Videos</a>
            </nav>
            
            <div class="sidebar-footer" style="margin-top: 35px; border-top: 1px solid rgba(255, 255, 255, 0.05); padding-top: 20px;">
                <a href="mailto:ragulkannadasan@gmail.com" class="contact-link" style="display: flex; align-items: center; gap: 14px; text-decoration: none; color: var(--sidebar-text); padding: 12px 16px; border-radius: 10px; font-weight: 500; transition: all 0.3s;">
                    <span class="material-icons-round">mail</span> Contact
                </a>
            </div>
        </aside>

        <main class="main-content">
            <header class="topbar">
                <span class="material-icons-round menu-toggle" id="menu-toggle">menu</span>
                <div class="search-bar">
                    <span class="material-icons-round search-icon">search</span>
                    <input type="text" id="search-input" placeholder="Search by name or tags...">
                </div>
            </header>

            <div class="breadcrumbs-container">
                <ul id="breadcrumbs" class="breadcrumbs">
                </ul>
            </div>

            <div class="controls-bar">
                <div class="control-group">
                    <span class="material-icons-round control-icon">sort</span>
                    <label for="sort-select">Sort By:</label>
                    <select id="sort-select" class="dropdown-filter">
                        <option value="id-asc">Oldest First</option>
                        <option value="id-desc">Newest First</option>
                        <option value="name-asc">Name (A-Z)</option>
                        <option value="name-desc">Name (Z-A)</option>
                    </select>
                </div>
                <div class="control-group">
                    <span class="material-icons-round control-icon">filter_list</span>
                    <label for="filter-select">Show:</label>
                    <select id="filter-select" class="dropdown-filter">
                        <option value="all">All Media</option>
                        <option value="image">Images Only</option>
                        <option value="video">Videos Only</option>
                        <option value="favorite">Favorites</option>
                    </select>
                </div>
            </div>

            <div id="file-grid" class="grid-container">
                </div>
        </main>
    </div>

    <div id="lightbox" class="lightbox">
        <div class="lightbox-controls">
            <a id="lightbox-download" href="#" download title="Download Original">
                <span class="material-icons-round">file_download</span>
            </a>
            <span class="material-icons-round close-btn" id="close-lightbox" title="Close">close</span>
        </div>
        
        <img id="lightbox-img" src="" alt="Viewed Image" style="display: none;">
        <video id="lightbox-video" controls preload="metadata" style="display: none;"></video>
        <iframe id="lightbox-youtube" allow="autoplay; fullscreen" style="display: none;"></iframe>
    </div>

    <div id="notification" class="notification">
        <span class="material-icons-round spinner">hourglass_empty</span>
        <span id="notification-text">Processing...version 1.0</span>
    </div>

    <script src="script.js"></script>
</body>
</html>
